# Site information
site_name: odin-control
site_url: https://odin-detector.github.io/odin-control

# Repository information
repo_url: http://github.com/odin-detector/odin-control

# Configuration
theme:
  name: materialx
  topbar_style: primary   # glass primary accent
  palette:

    # Palette toggle for auto (system preference)
    - media: "(prefers-color-scheme)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  logo: images/odin.png
  features:
     - navigation.tabs
     - navigation.sections
     - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
plugins:
  - search
  - gen-files:
      scripts:
      - docs/scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: README.md
      implicit_index: true
  - section-index
  - mkdocstrings:
      handlers:
        python:
            options:
              docstring_style: sphinx
extra_css:
  - stylesheets/extra.css

# Navigation
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide: user-guide/
  - Developer Guide: developer-guide/
  - API Reference: reference/
  - Release notes: http://github.com/odin-detector/odin-control/releases
